# Local development database ONLY.
#
# Production uses Supabase (managed Postgres) per PROJECT_SPEC.md Section 2.
# The Prisma schema + RLS policies are plain Postgres and run identically on
# this local container and on Supabase — you only swap the connection string.
#
# Usage:
#   docker compose up -d db      # start local Postgres on :5432
#   docker compose down          # stop
#   docker compose down -v       # stop and wipe data
#
# The Redis + Nginx + app services below are commented out — they belong to
# Phase 4 (deployment). Phase 1 only needs the database.

services:
  db:
    image: postgres:16-alpine
    container_name: crm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - crm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Phase 4 (deployment) services — intentionally disabled for Phase 1 ---
  # redis:
  #   image: redis:7-alpine
  #   ports: ["6379:6379"]
  #
  # api:
  #   build: ./backend
  #   ...
  #
  # nginx:
  #   image: nginx:alpine
  #   ...

volumes:
  crm_db_data:
